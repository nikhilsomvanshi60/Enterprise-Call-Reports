<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT CALL REPORT LOGIN</title>
  <link href="style.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      animation: fadeIn 0.4s ease-out;
    }
    .logo-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      font-size: 2.2rem;
      margin-bottom: 0.75rem;
      display: inline-block;
    }
    h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-rosegold) 50%, var(--accent-orchid) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }
    p.subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .form-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .btn {
      width: 100%;
      margin-top: 0.5rem;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message-box {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: none;
      line-height: 1.4;
    }
    .message-box.error {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: var(--status-noanswer);
    }
    .message-box.success {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: var(--status-success);
    }
    .switch-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .switch-link a {
      color: var(--accent-rosegold);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
      position: relative;
    }
    .switch-link a::after {
      content: '';
      position: absolute;
      width: 100%;
      transform: scaleX(0);
      height: 2px;
      bottom: -2px;
      left: 0;
      background-color: var(--accent-rosegold);
      transform-origin: bottom right;
      transition: transform 0.25s ease-out;
    }
    .switch-link a:hover::after {
      transform: scaleX(1);
      transform-origin: bottom left;
    }
    .form-section {
      display: none;
    }
    .form-section.active {
      display: block;
      animation: fadeInUp 0.4s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
    }
  </style>
</head>

<body>

  <div class="login-container glass-card">
    <div class="logo-header">
      <div class="logo-icon">🔑</div>
      <h1 id="pageTitle">IT Dashboard Access</h1>
      <p class="subtitle" id="pageSubtitle">Secure Login</p>
    </div>

    <div id="messageBox" class="message-box"></div>

    <!-- Login Form -->
    <div id="loginSection" class="form-section active fade-in delay-1">
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="glass-input" placeholder="e.g. user@company.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="glass-input" placeholder="Enter password" required>
        </div>
        <button type="submit" id="loginBtn" class="btn btn-premium ripple">Log In</button>
      </form>
      <div class="switch-link">
        <a onclick="switchSection('forgotSection')">Forgot Password?</a><br><br>
        Don't have an account? <a onclick="switchSection('registerSection')">Register</a>
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerSection" class="form-section fade-in delay-1">
      <form id="registerForm">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" class="glass-input" placeholder="e.g. John Doe" required>
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" class="glass-input" placeholder="e.g. user@company.com" required>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" class="glass-input" placeholder="Create a password" required>
        </div>
        <button type="submit" id="regBtn" class="btn btn-premium ripple">Register</button>
      </form>
      <div class="switch-link">
        Already have an account? <a onclick="switchSection('loginSection')">Log In</a>
      </div>
    </div>

    <!-- Forgot Password Form -->
    <div id="forgotSection" class="form-section fade-in delay-1">
      <form id="forgotForm">
        <div class="form-group">
          <label for="forgotEmail">Email Address</label>
          <input type="email" id="forgotEmail" class="glass-input" placeholder="Registered email" required>
        </div>
        <div class="form-group">
          <label for="forgotNewPassword">New Password</label>
          <input type="password" id="forgotNewPassword" class="glass-input" placeholder="Enter new password" required>
        </div>
        <button type="submit" id="forgotBtn" class="btn btn-premium ripple">Reset Password</button>
      </form>
      <div class="switch-link">
        Remembered your password? <a onclick="switchSection('loginSection')">Log In</a>
      </div>
    </div>

  </div>

  <script>
    const messageBox = document.getElementById('messageBox');

    // Auto-redirect if already logged in
    window.onload = () => {
      const token = sessionStorage.getItem('ad_session_token');
      if (token) {
        window.location.href = `/dashboard.html?token=${encodeURIComponent(token)}`;
      }
    };

    function showMessage(msg, isError = true) {
      messageBox.textContent = (isError ? '❌ ' : '✅ ') + msg;
      messageBox.className = 'message-box ' + (isError ? 'error' : 'success');
      messageBox.style.display = 'block';
    }

    function switchSection(sectionId) {
      document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
      document.getElementById(sectionId).classList.add('active');
      messageBox.style.display = 'none';

      const title = document.getElementById('pageTitle');
      const subtitle = document.getElementById('pageSubtitle');

      if (sectionId === 'loginSection') {
        title.textContent = 'IT Dashboard Access';
        subtitle.textContent = 'Secure Login';
      } else if (sectionId === 'registerSection') {
        title.textContent = 'Create Account';
        subtitle.textContent = 'Register for Dashboard Access';
      } else if (sectionId === 'forgotSection') {
        title.textContent = 'Reset Password';
        subtitle.textContent = 'Set a new password for your account';
      }
    }

    // Login Form Submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Authenticating...';
      messageBox.style.display = 'none';

      const payload = {
        email: document.getElementById('loginEmail').value.trim(),
        password: document.getElementById('loginPassword').value
      };

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (response.ok && result.success) {
          sessionStorage.setItem('ad_session_token', result.token);
          if (window.location.port === '3001') {
            window.location.href = `/dashboard.html?token=${encodeURIComponent(result.token)}`;
          } else {
            window.location.href = `/?token=${encodeURIComponent(result.token)}`;
          }
        } else {
          showMessage(result.error || 'Access Denied: Invalid credentials.');
        }
      } catch (err) {
        showMessage('Connection failed. Verify server status.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    });

    // Register Form Submit
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.disabled = true;
      btn.textContent = 'Registering...';
      messageBox.style.display = 'none';

      const payload = {
        name: document.getElementById('regName').value.trim(),
        email: document.getElementById('regEmail').value.trim(),
        password: document.getElementById('regPassword').value
      };

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (response.ok && result.success) {
          showMessage('Registration successful! You can now log in.', false);
          setTimeout(() => switchSection('loginSection'), 2000);
        } else {
          showMessage(result.error || 'Registration failed.');
        }
      } catch (err) {
        showMessage('Connection failed. Verify server status.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Register';
      }
    });

    // Forgot Password Form Submit
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('forgotBtn');
      btn.disabled = true;
      btn.textContent = 'Updating...';
      messageBox.style.display = 'none';

      const payload = {
        email: document.getElementById('forgotEmail').value.trim(),
        newPassword: document.getElementById('forgotNewPassword').value
      };

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (response.ok && result.success) {
          showMessage('Password updated successfully! Please log in.', false);
          setTimeout(() => switchSection('loginSection'), 2000);
        } else {
          showMessage(result.error || 'Failed to update password.');
        }
      } catch (err) {
        showMessage('Connection failed. Verify server status.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>

</html>
