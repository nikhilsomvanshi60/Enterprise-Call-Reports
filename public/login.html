<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows Domain Login - IT Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #09090b;
      --bg-card: rgba(20, 20, 25, 0.6);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --status-noanswer: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.08) 0px, transparent 50%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      color: var(--text-primary);
      overflow: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2.5rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      font-size: 2.2rem;
      margin-bottom: 0.75rem;
      display: inline-block;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.2s ease;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .btn {
      width: 100%;
      padding: 0.85rem;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 0.5rem;
    }

    .btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: var(--status-noanswer);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: none;
      line-height: 1.4;
    }

    .hint {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-header">
      <div class="logo-icon">🔑</div>
      <h1>IT Dashboard Access</h1>
      <p class="subtitle">Log in using Windows PC or Domain Credentials</p>
    </div>

    <div id="errorBox" class="error-box"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="domain">Domain / PC Name</label>
        <input type="text" id="domain" placeholder="e.g. COMPANY_DOMAIN or . for Local PC" required>
        <span class="hint">Use <b>.</b> (dot) to login with local PC accounts</span>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. Administrator" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Windows password" required>
      </div>

      <button type="submit" id="submitBtn" class="btn">Log In</button>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const domainInput = document.getElementById('domain');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Authenticating...';

      const payload = {
        domain: domainInput.value.trim(),
        username: usernameInput.value.trim(),
        password: passwordInput.value
      };

      try {
        const response = await fetch('/api/auth/domain-login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (response.ok && result.success) {
          // Save the temporary secure session token in sessionStorage
          sessionStorage.setItem('ad_session_token', result.token);
          // Redirect directly to dashboard
          window.location.href = '/dashboard.html';
        } else {
          errorBox.textContent = '❌ ' + (result.error || 'Access Denied: Invalid credentials.');
          errorBox.style.display = 'block';
        }
      } catch (err) {
        errorBox.textContent = '❌ Connection failed. Verify local network server status.';
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
